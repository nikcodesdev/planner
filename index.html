<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Planner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --bg-secondary: #141414; --bg-tertiary: #1c1c1e; --bg-card: #1c1c1e; --bg-input: #2c2c2e;
    --text-primary: #ffffff; --text-secondary: #8e8e93; --text-tertiary: #636366;
    --accent: #0a84ff; --accent-light: #64d2ff; --success: #30d158; --danger: #ff453a; --warning: #ff9f0a;
    --separator: #38383a; --separator-light: #2c2c2e; --overlay: rgba(0,0,0,0.7);
  }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text-primary); overflow: hidden; -webkit-font-smoothing: antialiased; }
  #app { height: 100%; display: flex; flex-direction: column; }
  @media (min-width: 769px) {
    body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%); }
    #app { max-width: 1100px; margin: 0 auto; width: 100%; flex-direction: row; padding: 20px; gap: 20px; }
  }
  #auth-screen { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; transition: opacity 0.5s ease, transform 0.5s ease; }
  #auth-screen.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }
  .auth-icon { width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, #1c1c1e, #2c2c2e); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .auth-icon svg { width: 40px; height: 40px; color: var(--accent); }
  .auth-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
  .auth-subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; text-align: center; }
  .quote-box { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 32px; max-width: 320px; text-align: center; border: 1px solid var(--separator-light); }
  .quote-text { font-size: 14px; color: var(--text-primary); line-height: 1.5; font-style: italic; }
  .quote-author { font-size: 12px; color: var(--text-tertiary); margin-top: 8px; }
  .pin-display { display: flex; gap: 16px; margin-bottom: 32px; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; background: var(--bg-input); border: 2px solid var(--separator); transition: all 0.2s ease; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: var(--danger); border-color: var(--danger); animation: shake 0.4s ease; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 280px; }
  .numpad-btn { width: 72px; height: 72px; border-radius: 50%; background: var(--bg-tertiary); border: none; color: var(--text-primary); font-size: 24px; font-weight: 500; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s ease; -webkit-touch-callout: none; user-select: none; }
  .numpad-btn:active { background: var(--separator); transform: scale(0.92); }
  .numpad-btn.delete { background: transparent; color: var(--text-secondary); font-size: 18px; }

  .desktop-sidebar { display: none; }
  @media (min-width: 769px) {
    .desktop-sidebar { display: flex; flex-direction: column; width: 240px; flex-shrink: 0; background: var(--bg-secondary); border-radius: 20px; padding: 24px 16px; border: 1px solid var(--separator-light); }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; padding: 0 8px; }
    .sidebar-logo-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; }
    .sidebar-logo-icon svg { width: 22px; height: 22px; color: white; }
    .sidebar-logo-text { font-size: 20px; font-weight: 700; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); border: none; background: none; font-family: inherit; font-size: 15px; width: 100%; text-align: left; }
    .sidebar-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .sidebar-item.active { background: var(--accent); color: white; }
    .sidebar-item svg { width: 20px; height: 20px; flex-shrink: 0; }
    .sidebar-footer { margin-top: auto; padding: 16px 8px 0; font-size: 12px; color: var(--text-tertiary); border-top: 1px solid var(--separator-light); }
  }

  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  @media (min-width: 769px) { .main-area { background: var(--bg-secondary); border-radius: 20px; border: 1px solid var(--separator-light); overflow: hidden; min-width: 0; } }
  .content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 16px 100px; -webkit-overflow-scrolling: touch; }
  @media (min-width: 769px) { .content { padding: 24px 28px 24px; } }
  .content::-webkit-scrollbar { display: none; }

  .header { padding: 16px 16px 8px; position: sticky; top: 0; background: var(--bg); z-index: 10; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  @media (min-width: 769px) { .header { background: var(--bg-secondary); padding: 24px 28px 12px; } }
  .header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
  @media (min-width: 769px) { .header h1 { font-size: 28px; } }
  .header-date { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  .input-area { display: flex; gap: 8px; padding: 12px 0; margin-bottom: 8px; }
  @media (min-width: 769px) { .input-area { padding: 16px 0 12px; } }
  .input-field { flex: 1; background: var(--bg-input); border: none; border-radius: 12px; padding: 12px 16px; color: var(--text-primary); font-size: 16px; outline: none; font-family: inherit; }
  .input-field::placeholder { color: var(--text-tertiary); }
  .btn-add { width: 44px; height: 44px; border-radius: 12px; background: var(--accent); border: none; color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s ease; flex-shrink: 0; }
  .btn-add:active { transform: scale(0.92); opacity: 0.8; }

  .list { display: flex; flex-direction: column; gap: 1px; }
  @media (min-width: 769px) { .list { gap: 2px; } }
  .list-item { background: var(--bg-card); padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: grab; transition: all 0.2s ease; position: relative; overflow: hidden; touch-action: manipulation; }
  .list-item:first-child { border-radius: 12px 12px 0 0; }
  .list-item:last-child { border-radius: 0 0 12px 12px; }
  .list-item:only-child { border-radius: 12px; }
  .list-item:hover { background: var(--bg-tertiary); }
  .list-item:active { cursor: grabbing; }
  .list-item.sortable-ghost { opacity: 0.3; background: var(--accent); }
  .list-item.sortable-drag { opacity: 0.9; background: var(--bg-tertiary); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .list-item.completed .item-text { text-decoration: line-through; color: var(--text-tertiary); }
  .list-item.completed .checkbox { background: var(--success); border-color: var(--success); }
  .checkbox { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--separator); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; cursor: pointer; }
  .checkbox svg { width: 12px; height: 12px; color: white; opacity: 0; transition: opacity 0.2s; }
  .list-item.completed .checkbox svg { opacity: 1; }
  .item-text { flex: 1; font-size: 16px; line-height: 1.4; word-break: break-word; }
  .item-arrow { color: var(--text-tertiary); font-size: 14px; }
  .item-meta { font-size: 12px; color: var(--text-tertiary); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 15px; }

  .section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; padding: 20px 4px 8px; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-top: 1px solid var(--separator-light); display: flex; justify-content: space-around; align-items: center; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 100; }
  @media (min-width: 769px) { .bottom-nav { display: none; } }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; cursor: pointer; transition: all 0.2s; color: var(--text-tertiary); text-decoration: none; border: none; background: none; }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 24px; height: 24px; }
  .nav-item span { font-size: 10px; font-weight: 500; }

  .modal-overlay { position: fixed; inset: 0; background: var(--overlay); display: flex; align-items: flex-end; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal-sheet { background: var(--bg-secondary); width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; padding: 20px 0 30px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); max-height: 85vh; display: flex; flex-direction: column; }
  .modal-overlay.active .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 36px; height: 5px; border-radius: 3px; background: var(--separator); margin: 0 auto 16px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px 16px; }
  .modal-title { font-size: 20px; font-weight: 700; }
  .modal-close { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-tertiary); border: none; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .modal-content { flex: 1; overflow-y: auto; padding: 0 20px; }
  .modal-content::-webkit-scrollbar { display: none; }

  .desktop-detail { display: none; }
  @media (min-width: 769px) {
    .desktop-detail { display: flex; flex-direction: column; width: 380px; flex-shrink: 0; background: var(--bg-secondary); border-radius: 20px; border: 1px solid var(--separator-light); overflow: hidden; }
    .detail-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--separator-light); }
    .detail-title { font-size: 18px; font-weight: 700; }
    .detail-close { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-tertiary); border: none; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .detail-content { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .detail-content::-webkit-scrollbar { display: none; }
    .detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-tertiary); text-align: center; padding: 40px; }
    .detail-empty svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.2; }
  }

  .goal-textarea { width: 100%; min-height: 200px; background: var(--bg-input); border: none; border-radius: 12px; padding: 16px; color: var(--text-primary); font-size: 16px; font-family: inherit; resize: vertical; outline: none; line-height: 1.6; }
  .goal-textarea::placeholder { color: var(--text-tertiary); }

  .project-desc-textarea { width: 100%; min-height: 100px; background: var(--bg-input); border: none; border-radius: 12px; padding: 14px 16px; color: var(--text-primary); font-size: 15px; font-family: inherit; resize: vertical; outline: none; line-height: 1.6; margin-bottom: 16px; }
  .project-desc-textarea::placeholder { color: var(--text-tertiary); }
  .detail-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--bg-tertiary); color: var(--text-primary); padding: 12px 20px; border-radius: 12px; font-size: 14px; z-index: 300; opacity: 0; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 1px solid var(--separator); }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--separator); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-secondary); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  .subtask-list { display: flex; flex-direction: column; gap: 1px; border-radius: 12px; overflow: hidden; }
  .subtask-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-card); border-bottom: 1px solid var(--separator-light); cursor: grab; touch-action: manipulation; }
  .subtask-item:last-child { border-bottom: none; }
  .subtask-item.sortable-ghost { opacity: 0.3; background: var(--accent); }
  .subtask-item.sortable-drag { opacity: 0.9; background: var(--bg-tertiary); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .subtask-item.completed .subtask-text { text-decoration: line-through; color: var(--text-tertiary); }
  .subtask-checkbox { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--separator); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
  .subtask-item.completed .subtask-checkbox { background: var(--success); border-color: var(--success); }
  .subtask-checkbox svg { width: 12px; height: 12px; color: white; opacity: 0; }
  .subtask-item.completed .subtask-checkbox svg { opacity: 1; }
  .subtask-text { flex: 1; font-size: 15px; }

  .btn-delete { padding: 12px 20px; font-size: 15px; border-radius: 12px; background: var(--danger); border: none; color: white; cursor: pointer; font-family: inherit; transition: all 0.15s; font-weight: 500; display: inline-flex; align-items: center; justify-content: center; }
  .btn-delete:hover { opacity: 0.85; }
  .btn-delete:active { transform: scale(0.97); }

  @media (max-width: 768px) { .desktop-sidebar { display: none !important; } .desktop-detail { display: none !important; } }
</style>
</head>
<body>
<div id="app">
  <div id="loading" class="loading-overlay"><div class="spinner"></div><div class="loading-text">Загрузка...</div></div>

  <div id="auth-screen">
    <div class="auth-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>
    <div class="auth-title">Planner</div>
    <div class="auth-subtitle">Введите код доступа</div>
    <div class="quote-box"><div class="quote-text" id="quote-text"></div><div class="quote-author" id="quote-author"></div></div>
    <div class="pin-display" id="pin-display"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
    <div class="numpad" id="numpad">
      <button class="numpad-btn" data-num="1">1</button><button class="numpad-btn" data-num="2">2</button><button class="numpad-btn" data-num="3">3</button>
      <button class="numpad-btn" data-num="4">4</button><button class="numpad-btn" data-num="5">5</button><button class="numpad-btn" data-num="6">6</button>
      <button class="numpad-btn" data-num="7">7</button><button class="numpad-btn" data-num="8">8</button><button class="numpad-btn" data-num="9">9</button>
      <div></div><button class="numpad-btn" data-num="0">0</button>
      <button class="numpad-btn delete" data-action="delete"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg></button>
    </div>
  </div>

  <div class="desktop-sidebar" id="desktop-sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>
      <div class="sidebar-logo-text">Planner</div>
    </div>
    <div class="sidebar-nav">
      <button class="sidebar-item active" data-tab="tasks"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Задачи</button>
      <button class="sidebar-item" data-tab="projects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Проекты</button>
      <button class="sidebar-item" data-tab="goals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Цели</button>
    </div>
    <div class="sidebar-footer">Синхронизация через Firebase</div>
  </div>

  <div class="main-area" id="main-screen" style="display:none;">
    <div class="content" id="content"></div>
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="tasks"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Задачи</span></button>
      <button class="nav-item" data-tab="projects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span>Проекты</span></button>
      <button class="nav-item" data-tab="goals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><span>Цели</span></button>
    </nav>
  </div>

  <div class="desktop-detail" id="desktop-detail" style="display:none;">
    <div class="detail-header"><div class="detail-title" id="detail-title">Выберите элемент</div><button class="detail-close" id="detail-close"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="detail-content" id="detail-content">
      <div class="detail-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><p>Выберите проект или цель<br>чтобы увидеть детали</p></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header"><div class="modal-title" id="modal-title">Заголовок</div><button class="modal-close" id="modal-close"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import Sortable from "https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYjECT3r5FtaGCBTYkMAcx9uBJf6sGpOA",
  authDomain: "planner-807fb.firebaseapp.com",
  databaseURL: "https://planner-807fb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "planner-807fb",
  storageBucket: "planner-807fb.firebasestorage.app",
  messagingSenderId: "3741010447",
  appId: "1:3741010447:web:90734f4ea6d74b4e57f17a"

let currentTab = 'tasks';
let currentProject = null;
let currentGoal = null;
let pin = '';
let data = { tasks: [], projects: [], goals: [] };
let isDesktop = window.innerWidth >= 769;
let sortableInstances = [];

const authScreen = document.getElementById('auth-screen');
const mainScreen = document.getElementById('main-screen');
const desktopDetail = document.getElementById('desktop-detail');
const content = document.getElementById('content');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const modalContent = document.getElementById('modal-content');
const detailTitle = document.getElementById('detail-title');
const detailContent = document.getElementById('detail-content');
const toastEl = document.getElementById('toast');
const loadingEl = document.getElementById('loading');
const pinDisplay = document.getElementById('pin-display');

function getUserRef() { return ref(db, 'users/' + FIXED_USER_ID); }

function showQuote() {
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('quote-text').textContent = '"' + q.text + '"';
  document.getElementById('quote-author').textContent = q.author ? '— ' + q.author : '';
}
showQuote();

function updatePinDisplay() {
  pinDisplay.querySelectorAll('.pin-dot').forEach((d, i) => d.classList.toggle('filled', i < pin.length));
}
function onPinError() {
  const dots = pinDisplay.querySelectorAll('.pin-dot');
  dots.forEach(d => d.classList.add('error'));
  setTimeout(() => dots.forEach(d => d.classList.remove('error')), 400);
  pin = ''; updatePinDisplay();
}
function checkPin() {
  if (pin === '7350') {
    authScreen.classList.add('hidden');
    setTimeout(() => {
      authScreen.style.display = 'none';
      mainScreen.style.display = 'flex';
      document.getElementById('desktop-sidebar').style.display = 'flex';
      if (isDesktop) desktopDetail.style.display = 'flex';
      loadData();
    }, 500);
  } else { onPinError(); showToast('Неверный код'); }
}

document.getElementById('numpad').addEventListener('click', e => {
  const btn = e.target.closest('.numpad-btn');
  if (!btn) return;
  if (btn.dataset.action === 'delete') { pin = pin.slice(0, -1); }
  else if (btn.dataset.num && pin.length < 4) {
    pin += btn.dataset.num;
    if (pin.length === 4) setTimeout(checkPin, 150);
  }
  updatePinDisplay();
});

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2500);
}

async function saveData() {
  try { await set(getUserRef(), data); console.log('Saved'); }
  catch (e) { console.error(e); showToast('Ошибка сохранения'); }
}

function loadData() {
  loadingEl.style.display = 'flex';
  onValue(getUserRef(), snapshot => {
    const val = snapshot.val();
    data = val || { tasks: [], projects: [], goals: [] };
    if (!Array.isArray(data.tasks)) data.tasks = [];
    if (!Array.isArray(data.projects)) data.projects = [];
    if (!Array.isArray(data.goals)) data.goals = [];
    loadingEl.style.display = 'none';
    render();
  }, err => {
    console.error(err); loadingEl.style.display = 'none';
    showToast('Ошибка загрузки'); render();
  });
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

function formatDate() {
  const d = new Date();
  const m = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  return days[d.getDay()] + ', ' + d.getDate() + ' ' + m[d.getMonth()];
}

function escapeHtml(text) { const el = document.createElement('div'); el.textContent = text; return el.innerHTML; }

function isDesktopView() { return window.innerWidth >= 769; }

function destroySortables() {
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];
}

function initSortable(el, onEnd, options) {
  if (!el) return null;
  options = options || {};
  const s = new Sortable(el, {
    animation: 200,
    ghostClass: 'sortable-ghost',
    dragClass: 'sortable-drag',
    delay: 200,
    delayOnTouchOnly: true,
    onEnd: onEnd,
    ...options
  });
  sortableInstances.push(s);
  return s;
}

function render() {
  destroySortables();
  if (currentTab === 'tasks') renderTasks();
  else if (currentTab === 'projects') renderProjects();
  else if (currentTab === 'goals') renderGoals();
}

function renderTasks() {
  const active = data.tasks.filter(t => !t.completed);
  const completed = data.tasks.filter(t => t.completed);
  let html = '<div class="header"><h1>Задачи</h1><div class="header-date">' + formatDate() + '</div></div>' +
    '<div class="input-area"><input type="text" class="input-field" id="task-input" placeholder="Новая задача..." maxlength="200"><button class="btn-add" id="add-task-btn">+</button></div>';
  if (active.length === 0 && completed.length === 0) {
    html += '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Нет задач. Добавь первую!</p></div>';
  } else {
    if (active.length > 0) {
      html += '<div class="section-title">Активные</div><div class="list" id="active-tasks-list">';
      active.forEach(t => { html += '<div class="list-item fade-in" data-id="' + t.id + '"><div class="checkbox" data-action="toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="item-text">' + escapeHtml(t.text) + '</div></div>'; });
      html += '</div>';
    }
    if (completed.length > 0) {
      html += '<div class="section-title">Выполненные</div><div class="list" id="completed-tasks-list">';
      completed.forEach(t => { html += '<div class="list-item completed fade-in" data-id="' + t.id + '"><div class="checkbox" data-action="toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="item-text">' + escapeHtml(t.text) + '</div></div>'; });
      html += '</div>';
    }
  }
  content.innerHTML = html;
  document.getElementById('add-task-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keypress', e => { if (e.key === 'Enter') addTask(); });

  content.querySelectorAll('.list-item').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.closest('[data-action="toggle"]') || e.target.closest('.item-text')) {
        const id = item.dataset.id;
        const task = data.tasks.find(t => t.id === id);
        if (task) {
          task.completed = !task.completed;
          saveData();
          if (task.completed) showToast('Задача выполнена');
        }
      }
    });
  });

  const activeList = document.getElementById('active-tasks-list');
  if (activeList) {
    initSortable(activeList, function(evt) {
      const items = Array.from(activeList.querySelectorAll('.list-item'));
      const newOrder = items.map(el => el.dataset.id);
      const activeTasks = data.tasks.filter(t => !t.completed);
      const completedTasks = data.tasks.filter(t => t.completed);
      const reordered = newOrder.map(id => activeTasks.find(t => t.id === id));
      data.tasks = reordered.concat(completedTasks);
      saveData();
    });
  }

  const completedList = document.getElementById('completed-tasks-list');
  if (completedList) {
    initSortable(completedList, function(evt) {
      const items = Array.from(completedList.querySelectorAll('.list-item'));
      const newOrder = items.map(el => el.dataset.id);
      const activeTasks = data.tasks.filter(t => !t.completed);
      const completedTasks = data.tasks.filter(t => t.completed);
      const reordered = newOrder.map(id => completedTasks.find(t => t.id === id));
      data.tasks = activeTasks.concat(reordered);
      saveData();
    });
  }
}

function addTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;
  data.tasks.unshift({ id: genId(), text: text, completed: false, createdAt: Date.now() });
  saveData(); input.value = ''; input.focus();
}

function renderProjects() {
  let html = '<div class="header"><h1>Проекты</h1><div class="header-date">' + formatDate() + '</div></div>' +
    '<div class="input-area"><input type="text" class="input-field" id="project-input" placeholder="Новый проект..." maxlength="200"><button class="btn-add" id="add-project-btn">+</button></div>';
  if (data.projects.length === 0) {
    html += '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><p>Нет проектов. Создай первый!</p></div>';
  } else {
    html += '<div class="list" id="projects-list">';
    data.projects.forEach(proj => {
      const subtasks = proj.subtasks || [];
      const completed = subtasks.filter(s => s.completed).length;
      html += '<div class="list-item fade-in" data-id="' + proj.id + '"><div class="item-text">' + escapeHtml(proj.name) + '</div><div class="item-meta">' + completed + '/' + subtasks.length + '</div><div class="item-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>';
    });
    html += '</div>';
  }
  content.innerHTML = html;
  document.getElementById('add-project-btn').addEventListener('click', addProject);
  document.getElementById('project-input').addEventListener('keypress', e => { if (e.key === 'Enter') addProject(); });
  content.querySelectorAll('.list-item').forEach(item => {
    item.addEventListener('click', (e) => {
      if (!e.target.closest('.list-item') || e.target.closest('[data-action]')) return;
      openProject(item.dataset.id);
    });
  });

  const projectsList = document.getElementById('projects-list');
  if (projectsList) {
    initSortable(projectsList, function(evt) {
      const items = Array.from(projectsList.querySelectorAll('.list-item'));
      const newOrder = items.map(el => el.dataset.id);
      data.projects = newOrder.map(id => data.projects.find(p => p.id === id));
      saveData();
    });
  }
}

function addProject() {
  const input = document.getElementById('project-input');
  const name = input.value.trim();
  if (!name) return;
  data.projects.unshift({ id: genId(), name: name, description: '', subtasks: [], createdAt: Date.now() });
  saveData(); input.value = ''; input.focus();
}

function openProject(projectId) {
  const project = data.projects.find(p => p.id === projectId);
  if (!project) return;
  currentProject = project;
  const html = buildProjectDetail(project);
  if (isDesktopView()) {
    detailTitle.textContent = escapeHtml(project.name);
    detailContent.innerHTML = html;
    attachProjectListeners(projectId);
  } else {
    modalTitle.textContent = escapeHtml(project.name);
    modalContent.innerHTML = html;
    modal.classList.add('active');
    attachProjectListeners(projectId);
  }
}

function buildProjectDetail(project) {
  const subtasks = project.subtasks || [];
  const completed = subtasks.filter(s => s.completed).length;
  const progress = subtasks.length > 0 ? Math.round((completed / subtasks.length) * 100) : 0;

  let html = '';

  if (subtasks.length > 0) {
    html += '<div style="margin-bottom: 20px;">' +
      '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">' +
        '<span style="font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Прогресс</span>' +
        '<span style="font-size: 13px; color: var(--text-secondary);">' + completed + '/' + subtasks.length + ' (' + progress + '%)</span>' +
      '</div>' +
      '<div style="width: 100%; height: 6px; background: var(--bg-input); border-radius: 3px; overflow: hidden;">' +
        '<div style="width: ' + progress + '%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 3px; transition: width 0.3s ease;"></div>' +
      '</div>' +
    '</div>';
  }

  html += '<div class="detail-label">Описание</div>' +
    '<textarea class="project-desc-textarea" id="project-desc" placeholder="Описание проекта, заметки, идеи...">' + escapeHtml(project.description || '') + '</textarea>';

  html += '<div class="input-area" style="margin-bottom: 16px;"><input type="text" class="input-field" id="subtask-input" placeholder="Новая подзадача..." maxlength="200"><button class="btn-add" id="add-subtask-btn">+</button></div>';

  html += '<div class="subtask-list" id="subtasks-list">';
  if (subtasks.length === 0) {
    html += '<div class="empty-state" style="padding: 40px 20px;"><p>Нет подзадач. Добавь первую!</p></div>';
  } else {
    subtasks.forEach((sub, idx) => {
      html += '<div class="subtask-item ' + (sub.completed ? 'completed' : '') + '" data-idx="' + idx + '"><div class="subtask-checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="subtask-text">' + escapeHtml(sub.text) + '</div></div>';
    });
  }
  html += '</div>';
  html += '<button class="btn-delete" id="delete-project-btn" style="margin-top: 16px;">Удалить проект</button>';
  return html;
}

function attachProjectListeners(projectId) {
  const btn = document.getElementById('add-subtask-btn');
  if (btn) btn.addEventListener('click', () => addSubtask(projectId));
  const input = document.getElementById('subtask-input');
  if (input) input.addEventListener('keypress', e => { if (e.key === 'Enter') addSubtask(projectId); });

  const descArea = document.getElementById('project-desc');
  if (descArea) {
    let descTimeout;
    descArea.addEventListener('input', () => {
      clearTimeout(descTimeout);
      descTimeout = setTimeout(() => {
        const proj = data.projects.find(p => p.id === projectId);
        if (proj) {
          proj.description = descArea.value;
          saveData();
        }
      }, 800);
    });
  }

  const container = isDesktopView() ? detailContent : modalContent;

  container.querySelectorAll('.subtask-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx);
      const proj = data.projects.find(p => p.id === projectId);
      if (proj && proj.subtasks && proj.subtasks[idx]) {
        proj.subtasks[idx].completed = !proj.subtasks[idx].completed;
        saveData();
        openProject(projectId);
      }
    });
  });

  const subtasksList = container.querySelector('#subtasks-list');
  if (subtasksList && subtasksList.querySelectorAll('.subtask-item').length > 1) {
    initSortable(subtasksList, function(evt) {
      const items = Array.from(subtasksList.querySelectorAll('.subtask-item'));
      const newOrder = items.map(el => parseInt(el.dataset.idx));
      const proj = data.projects.find(p => p.id === projectId);
      if (proj && proj.subtasks) {
        const reordered = newOrder.map(oldIdx => proj.subtasks[oldIdx]);
        proj.subtasks = reordered;
        saveData();
        openProject(projectId);
      }
    });
  }

  const delBtn = document.getElementById('delete-project-btn');
  if (delBtn) {
    delBtn.addEventListener('click', () => {
      const proj = data.projects.find(p => p.id === projectId);
      const projName = proj ? proj.name : 'этот проект';
      if (confirm('Удалить проект "' + projName + '"?')) {
        data.projects = data.projects.filter(p => p.id !== projectId);
        saveData();
        showToast('Проект удалён');
        if (isDesktopView()) {
          resetDetailPanel();
        } else {
          closeModal();
        }
      }
    });
  }
}

function addSubtask(projectId) {
  const input = document.getElementById('subtask-input');
  const text = input.value.trim();
  if (!text) return;
  const proj = data.projects.find(p => p.id === projectId);
  if (proj) {
    if (!proj.subtasks) proj.subtasks = [];
    proj.subtasks.push({ text: text, completed: false, createdAt: Date.now() });
    saveData();
    openProject(projectId);
  }
}

function renderGoals() {
  let html = '<div class="header"><h1>Цели</h1><div class="header-date">' + formatDate() + '</div></div>' +
    '<div class="input-area"><input type="text" class="input-field" id="goal-input" placeholder="Новая цель..." maxlength="200"><button class="btn-add" id="add-goal-btn">+</button></div>';
  if (data.goals.length === 0) {
    html += '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><p>Нет целей. Задай первую!</p></div>';
  } else {
    html += '<div class="list" id="goals-list">';
    data.goals.forEach(g => { html += '<div class="list-item fade-in" data-id="' + g.id + '"><div class="item-text">' + escapeHtml(g.title) + '</div><div class="item-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>'; });
    html += '</div>';
  }
  content.innerHTML = html;
  document.getElementById('add-goal-btn').addEventListener('click', addGoal);
  document.getElementById('goal-input').addEventListener('keypress', e => { if (e.key === 'Enter') addGoal(); });
  content.querySelectorAll('.list-item').forEach(item => {
    item.addEventListener('click', () => openGoal(item.dataset.id));
  });

  const goalsList = document.getElementById('goals-list');
  if (goalsList) {
    initSortable(goalsList, function(evt) {
      const items = Array.from(goalsList.querySelectorAll('.list-item'));
      const newOrder = items.map(el => el.dataset.id);
      data.goals = newOrder.map(id => data.goals.find(g => g.id === id));
      saveData();
    });
  }
}

function addGoal() {
  const input = document.getElementById('goal-input');
  const title = input.value.trim();
  if (!title) return;
  data.goals.unshift({ id: genId(), title: title, content: '', createdAt: Date.now() });
  saveData(); input.value = ''; input.focus();
}

function openGoal(goalId) {
  const goal = data.goals.find(g => g.id === goalId);
  if (!goal) return;
  currentGoal = goal;
  const html = '<textarea class="goal-textarea" id="goal-textarea" placeholder="Опиши свою цель, мысли, идеи...">' + escapeHtml(goal.content || '') + '</textarea>' +
    '<div style="margin-top: 16px; display: flex; align-items: center; gap: 10px;">' +
      '<button class="btn-add" id="save-goal-btn" style="width: auto; height: 44px; padding: 0 24px; font-size: 15px; border-radius: 10px;">Сохранить</button>' +
      '<button class="btn-delete" id="delete-goal-btn" style="width: auto; height: 44px; padding: 0 24px; margin-top: 0;">Удалить цель</button>' +
    '</div>';
  if (isDesktopView()) {
    detailTitle.textContent = escapeHtml(goal.title);
    detailContent.innerHTML = html;
    attachGoalListeners(goalId);
  } else {
    modalTitle.textContent = escapeHtml(goal.title);
    modalContent.innerHTML = html;
    modal.classList.add('active');
    attachGoalListeners(goalId);
  }
}

function attachGoalListeners(goalId) {
  const textarea = document.getElementById('goal-textarea');
  if (textarea) textarea.focus();
  const saveBtn = document.getElementById('save-goal-btn');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    const goal = data.goals.find(g => g.id === goalId);
    if (goal) { goal.content = textarea.value; saveData(); showToast('Сохранено'); }
    if (!isDesktopView()) closeModal();
  });
  const delBtn = document.getElementById('delete-goal-btn');
  if (delBtn) delBtn.addEventListener('click', () => {
    if (confirm('Удалить цель?')) {
      data.goals = data.goals.filter(g => g.id !== goalId);
      saveData(); showToast('Цель удалена');
      if (isDesktopView()) {
        resetDetailPanel();
      } else {
        closeModal();
      }
    }
  });
}

function resetDetailPanel() {
  detailTitle.textContent = 'Выберите элемент';
  detailContent.innerHTML = '<div class="detail-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><p>Выберите проект или цель<br>чтобы увидеть детали</p></div>';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item, .sidebar-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('[data-tab="' + tab + '"]').forEach(i => i.classList.add('active'));
  if (isDesktopView()) {
    resetDetailPanel();
  }
  render();
}

document.querySelectorAll('.nav-item, .sidebar-item').forEach(item => {
  item.addEventListener('click', () => switchTab(item.dataset.tab));
});

document.getElementById('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.getElementById('detail-close').addEventListener('click', resetDetailPanel);

function closeModal() {
  modal.classList.remove('active');
  currentProject = null; currentGoal = null;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

let touchStartX = 0, swipingItem = null;
content.addEventListener('touchstart', e => {
  const item = e.target.closest('.list-item');
  if (!item || currentTab !== 'tasks') return;
  touchStartX = e.touches[0].clientX; swipingItem = item;
}, { passive: true });
content.addEventListener('touchmove', e => {
  if (!swipingItem) return;
  const diff = touchStartX - e.touches[0].clientX;
  if (diff > 0 && diff < 100) swipingItem.style.transform = 'translateX(-' + diff + 'px)';
}, { passive: true });
content.addEventListener('touchend', e => {
  if (!swipingItem) return;
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (diff > 60) {
    const id = swipingItem.dataset.id;
    const task = data.tasks.find(t => t.id === id);
    if (task && confirm('Удалить задачу?')) {
      data.tasks = data.tasks.filter(t => t.id !== id);
      saveData(); showToast('Задача удалена');
    }
  }
  swipingItem.style.transform = ''; swipingItem = null;
});

window.addEventListener('resize', () => {
  const wasDesktop = isDesktop;
  isDesktop = window.innerWidth >= 769;
  if (wasDesktop !== isDesktop) {
    if (isDesktop) {
      desktopDetail.style.display = 'flex';
      document.getElementById('desktop-sidebar').style.display = 'flex';
      resetDetailPanel();
    } else {
      desktopDetail.style.display = 'none';
      closeModal();
    }
    render();
  }
});

window.addEventListener('beforeinstallprompt', e => { console.log('PWA install available'); });

console.log('Planner initialized');
</script>
</body>
</html>
