<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Planner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a;
    --bg-secondary: #141414;
    --bg-tertiary: #1c1c1e;
    --bg-card: #1c1c1e;
    --bg-input: #2c2c2e;
    --text-primary: #ffffff;
    --text-secondary: #8e8e93;
    --text-tertiary: #636366;
    --accent: #0a84ff;
    --accent-light: #64d2ff;
    --success: #30d158;
    --danger: #ff453a;
    --warning: #ff9f0a;
    --separator: #38383a;
    --separator-light: #2c2c2e;
    --overlay: rgba(0,0,0,0.7);
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #app { height: 100%; display: flex; flex-direction: column; }

  @media (min-width: 769px) {
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
    }
    #app {
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      flex-direction: row;
      padding: 20px;
      gap: 20px;
    }
  }

  /* Auth Screen */
  #auth-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #auth-screen.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }
  .auth-icon {
    width: 80px; height: 80px; border-radius: 20px;
    background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .auth-icon svg { width: 40px; height: 40px; color: var(--accent); }
  .auth-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
  .auth-subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; text-align: center; }
  .quote-box {
    background: var(--bg-card); border-radius: 16px; padding: 20px;
    margin-bottom: 32px; max-width: 320px; text-align: center;
    border: 1px solid var(--separator-light);
  }
  .quote-text { font-size: 14px; color: var(--text-primary); line-height: 1.5; font-style: italic; }
  .quote-author { font-size: 12px; color: var(--text-tertiary); margin-top: 8px; }
  .pin-display {
    display: flex; gap: 16px; margin-bottom: 32px;
  }
  .pin-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--bg-input); border: 2px solid var(--separator);
    transition: all 0.2s ease;
  }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: var(--danger); border-color: var(--danger); animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .numpad {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    max-width: 280px;
  }
  .numpad-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--bg-tertiary); border: none;
    color: var(--text-primary); font-size: 24px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s ease;
    -webkit-touch-callout: none; user-select: none;
  }
  .numpad-btn:active { background: var(--separator); transform: scale(0.92); }
  .numpad-btn.delete { background: transparent; color: var(--text-secondary); font-size: 18px; }

  /* Desktop Sidebar */
  .desktop-sidebar {
    display: none;
  }
  @media (min-width: 769px) {
    .desktop-sidebar {
      display: flex;
      flex-direction: column;
      width: 240px;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 24px 16px;
      border: 1px solid var(--separator-light);
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px; padding: 0 8px;
    }
    .sidebar-logo-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--accent); display: flex;
      align-items: center; justify-content: center;
    }
    .sidebar-logo-icon svg { width: 22px; height: 22px; color: white; }
    .sidebar-logo-text { font-size: 20px; font-weight: 700; }
    .sidebar-nav {
      display: flex; flex-direction: column; gap: 4px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: 12px;
      cursor: pointer; transition: all 0.2s;
      color: var(--text-secondary); border: none; background: none;
      font-family: inherit; font-size: 15px; width: 100%; text-align: left;
    }
    .sidebar-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .sidebar-item.active { background: var(--accent); color: white; }
    .sidebar-item svg { width: 20px; height: 20px; flex-shrink: 0; }
    .sidebar-footer {
      margin-top: auto; padding: 16px 8px 0;
      font-size: 12px; color: var(--text-tertiary);
      border-top: 1px solid var(--separator-light);
    }
  }

  /* Main Area */
  .main-area {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 769px) {
    .main-area {
      background: var(--bg-secondary);
      border-radius: 20px;
      border: 1px solid var(--separator-light);
      overflow: hidden;
      min-width: 0;
    }
  }

  .content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px 16px 100px; -webkit-overflow-scrolling: touch;
  }
  @media (min-width: 769px) {
    .content {
      padding: 24px 28px 24px;
    }
  }
  .content::-webkit-scrollbar { display: none; }

  /* Header */
  .header {
    padding: 16px 16px 8px; position: sticky; top: 0;
    background: var(--bg); z-index: 10;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  @media (min-width: 769px) {
    .header {
      background: var(--bg-secondary);
      padding: 24px 28px 12px;
    }
  }
  .header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
  @media (min-width: 769px) {
    .header h1 { font-size: 28px; }
  }
  .header-date { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  /* Input Area */
  .input-area {
    display: flex; gap: 8px; padding: 12px 0; margin-bottom: 8px;
  }
  @media (min-width: 769px) {
    .input-area {
      padding: 16px 0 12px;
    }
  }
  .input-field {
    flex: 1; background: var(--bg-input); border: none; border-radius: 12px;
    padding: 12px 16px; color: var(--text-primary); font-size: 16px;
    outline: none; font-family: inherit;
  }
  .input-field::placeholder { color: var(--text-tertiary); }
  .btn-add {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--accent); border: none; color: white;
    font-size: 24px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s ease; flex-shrink: 0;
  }
  .btn-add:active { transform: scale(0.92); opacity: 0.8; }

  /* Lists */
  .list { display: flex; flex-direction: column; gap: 1px; }
  @media (min-width: 769px) {
    .list { gap: 2px; }
  }
  .list-item {
    background: var(--bg-card); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: default;
    transition: all 0.2s ease;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
  }
  .list-item:first-child { border-radius: 12px 12px 0 0; }
  .list-item:last-child { border-radius: 0 0 12px 12px; }
  .list-item:only-child { border-radius: 12px; }
  .list-item.completed .item-text { text-decoration: line-through; color: var(--text-tertiary); }
  .list-item.completed .checkbox { background: var(--success); border-color: var(--success); }
  
  /* Drag and drop styles */
  .list-item.dragging {
    opacity: 0.6;
    transform: scale(0.98);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 10;
    border-radius: 12px;
  }
  .list-item.drag-over {
    border-top: 2px solid var(--accent);
    border-radius: 0;
  }
  .list-item.drag-over:first-child {
    border-top: 2px solid var(--accent);
  }

  /* Swipe styles */
  .list-item.swiping {
    transition: transform 0.05s ease !important;
  }
  .list-item.swipe-delete-left {
    transform: translateX(-100%) !important;
    opacity: 0 !important;
    transition: transform 0.3s ease, opacity 0.3s ease !important;
  }
  .list-item.swipe-delete-right {
    transform: translateX(100%) !important;
    opacity: 0 !important;
    transition: transform 0.3s ease, opacity 0.3s ease !important;
  }

  /* Delete button for completed tasks - Desktop only */
  .delete-btn {
    opacity: 0;
    transition: opacity 0.2s ease;
    cursor: pointer;
    color: var(--text-tertiary);
    background: none;
    border: none;
    padding: 4px 8px;
    font-size: 16px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .delete-btn:hover {
    color: var(--danger);
    background: rgba(255, 69, 58, 0.1);
  }
  .delete-btn svg {
    width: 18px;
    height: 18px;
  }

  @media (min-width: 769px) {
    .list-item.completed .delete-btn {
      opacity: 0;
    }
    .list-item.completed:hover .delete-btn {
      opacity: 1;
    }
  }

  /* На мобильных скрываем кнопку удаления */
  @media (max-width: 768px) {
    .delete-btn {
      display: none !important;
    }
  }

  .checkbox {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--separator); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .checkbox svg { width: 12px; height: 12px; color: white; opacity: 0; transition: opacity 0.2s; }
  .list-item.completed .checkbox svg { opacity: 1; }
  .item-text { flex: 1; font-size: 16px; line-height: 1.4; word-break: break-word; cursor: default; }
  .item-arrow { color: var(--text-tertiary); font-size: 14px; flex-shrink: 0; }
  .item-meta { font-size: 12px; color: var(--text-tertiary); flex-shrink: 0; }
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-tertiary);
  }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 15px; }

  /* Sections */
  .section-title {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 20px 4px 8px;
  }

  /* Bottom Nav - Mobile only */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    border-top: 1px solid var(--separator-light);
    display: flex; justify-content: space-around; align-items: center;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  @media (min-width: 769px) {
    .bottom-nav { display: none; }
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 6px 0; cursor: pointer; transition: all 0.2s;
    color: var(--text-tertiary); text-decoration: none; border: none; background: none;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 24px; height: 24px; }
  .nav-item span { font-size: 10px; font-weight: 500; }

  /* Modal - Mobile only */
  .modal-overlay {
    position: fixed; inset: 0; background: var(--overlay);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal-sheet {
    background: var(--bg-secondary); width: 100%; max-width: 500px;
    border-radius: 24px 24px 0 0; padding: 20px 0 30px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh; display: flex; flex-direction: column;
  }
  .modal-overlay.active .modal-sheet { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 5px; border-radius: 3px;
    background: var(--separator); margin: 0 auto 16px;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px 16px;
  }
  .modal-title { font-size: 20px; font-weight: 700; }
  .modal-close {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-tertiary); border: none; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .modal-content { flex: 1; overflow-y: auto; padding: 0 20px; }
  .modal-content::-webkit-scrollbar { display: none; }

  /* Desktop Detail Panel */
  .desktop-detail {
    display: none;
  }
  @media (min-width: 769px) {
    .desktop-detail {
      display: flex;
      flex-direction: column;
      width: 380px;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-radius: 20px;
      border: 1px solid var(--separator-light);
      overflow: hidden;
    }
    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--separator-light);
    }
    .detail-title { font-size: 18px; font-weight: 700; }
    .detail-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg-tertiary); border: none; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .detail-content {
      flex: 1; overflow-y: auto; padding: 20px 24px;
    }
    .detail-content::-webkit-scrollbar { display: none; }
    .detail-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--text-tertiary);
      text-align: center; padding: 40px;
    }
    .detail-empty svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.2; }
  }

  /* Textarea for goals */
  .goal-textarea {
    width: 100%; min-height: 200px; background: var(--bg-input); border: none;
    border-radius: 12px; padding: 16px; color: var(--text-primary); font-size: 16px;
    font-family: inherit; resize: vertical; outline: none; line-height: 1.6;
  }
  .goal-textarea::placeholder { color: var(--text-tertiary); }

  /* Project subtasks */
  .subtask-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    background: var(--bg-card); border-bottom: 1px solid var(--separator-light);
  }
  .subtask-item:last-child { border-bottom: none; }
  .subtask-item.completed .subtask-text { text-decoration: line-through; color: var(--text-tertiary); }
  .subtask-checkbox {
    width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid var(--separator); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
  }
  .subtask-item.completed .subtask-checkbox { background: var(--success); border-color: var(--success); }
  .subtask-checkbox svg { width: 12px; height: 12px; color: white; opacity: 0; }
  .subtask-item.completed .subtask-checkbox svg { opacity: 1; }
  .subtask-text { flex: 1; font-size: 15px; }

  /* Delete button */
  .btn-delete {
    padding: 12px 20px; font-size: 15px; border-radius: 12px;
    background: var(--danger); border: none; color: white; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
    font-weight: 500; display: inline-flex; align-items: center; justify-content: center;
  }
  .btn-delete:hover { opacity: 0.85; }
  .btn-delete:active { transform: scale(0.97); }

  .project-delete-container {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--separator-light);
  }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
    background: var(--bg-tertiary); color: var(--text-primary); padding: 12px 20px;
    border-radius: 12px; font-size: 14px; z-index: 300; opacity: 0;
    transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border: 1px solid var(--separator);
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Loading */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--separator);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-secondary); }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  @media (max-width: 768px) {
    .desktop-sidebar { display: none !important; }
    .desktop-detail { display: none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- Loading -->
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Загрузка...</div>
  </div>

  <!-- Auth -->
  <div id="auth-screen">
    <div class="auth-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </div>
    <div class="auth-title">Planner</div>
    <div class="auth-subtitle">Введите код доступа</div>
    <div class="quote-box">
      <div class="quote-text" id="quote-text"></div>
      <div class="quote-author" id="quote-author"></div>
    </div>
    <div class="pin-display" id="pin-display">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="numpad" id="numpad">
      <button class="numpad-btn" data-num="1">1</button>
      <button class="numpad-btn" data-num="2">2</button>
      <button class="numpad-btn" data-num="3">3</button>
      <button class="numpad-btn" data-num="4">4</button>
      <button class="numpad-btn" data-num="5">5</button>
      <button class="numpad-btn" data-num="6">6</button>
      <button class="numpad-btn" data-num="7">7</button>
      <button class="numpad-btn" data-num="8">8</button>
      <button class="numpad-btn" data-num="9">9</button>
      <div></div>
      <button class="numpad-btn" data-num="0">0</button>
      <button class="numpad-btn delete" data-action="delete">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
      </button>
    </div>
  </div>

  <!-- Desktop Sidebar -->
  <div class="desktop-sidebar" id="desktop-sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <div class="sidebar-logo-text">Planner</div>
    </div>
    <div class="sidebar-nav">
      <button class="sidebar-item active" data-tab="tasks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Задачи
      </button>
      <button class="sidebar-item" data-tab="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Проекты
      </button>

// ===== SWIPE TO DELETE =====
function initSwipeDelete() {
  let swipeStartX = 0;
  let swipeStartY = 0;
  let swipeItem = null;
  let isSwiping = false;
  
  // Удаляем старые обработчики
  content.removeEventListener('touchstart', swipeTouchStart);
  content.removeEventListener('touchmove', swipeTouchMove);
  content.removeEventListener('touchend', swipeTouchEnd);
  
  function swipeTouchStart(e) {
    const item = e.target.closest('.list-item');
    if (!item) return;
    
    const task = data.tasks.find(t => t.id === item.dataset.id);
    if (!task || !task.completed) return;
    if (e.target.closest('.checkbox')) return;
    if (e.target.closest('.delete-btn')) return;
    
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
    swipeItem = item;
    isSwiping = false;
  }
  
  function swipeTouchMove(e) {
    if (!swipeItem) return;
    
    const deltaX = e.touches[0].clientX - swipeStartX;
    const deltaY = e.touches[0].clientY - swipeStartY;
    
    if (Math.abs(deltaX) > 10 && Math.abs(deltaX) > Math.abs(deltaY) * 1.5) {
      isSwiping = true;
      e.preventDefault();
      
      const maxSwipe = 80;
      let offset = Math.min(Math.abs(deltaX), maxSwipe);
      
      swipeItem.style.transition = 'transform 0.05s ease';
      if (deltaX < 0) {
        swipeItem.style.transform = `translateX(-${offset}px)`;
        swipeItem.style.background = `rgba(255, 69, 58, ${offset / maxSwipe * 0.2})`;
      } else {
        swipeItem.style.transform = `translateX(${offset}px)`;
        swipeItem.style.background = `rgba(255, 69, 58, ${offset / maxSwipe * 0.2})`;
      }
    }
  }
  
  function swipeTouchEnd(e) {
    if (!swipeItem) return;
    
    const deltaX = e.changedTouches[0].clientX - swipeStartX;
    const threshold = 50;
    
    if (isSwiping && Math.abs(deltaX) > threshold) {
      const task = data.tasks.find(t => t.id === swipeItem.dataset.id);
      if (task && task.completed) {
        if (deltaX < 0) {
          swipeItem.classList.add('swipe-delete-left');
        } else {
          swipeItem.classList.add('swipe-delete-right');
        }
        
        setTimeout(() => {
          data.tasks = data.tasks.filter(t => t.id !== task.id);
          saveData();
          showToast('Задача удалена');
          renderTasks();
        }, 350);
      }
    } else {
      swipeItem.style.transition = 'transform 0.3s ease';
      swipeItem.style.transform = '';
      swipeItem.style.background = '';
      
      setTimeout(() => {
        if (swipeItem) {
          swipeItem.style.transition = '';
        }
      }, 300);
    }
    
    swipeItem = null;
    isSwiping = false;
  }
  
  content.addEventListener('touchstart', swipeTouchStart, { passive: true });
  content.addEventListener('touchmove', swipeTouchMove, { passive: false });
  content.addEventListener('touchend', swipeTouchEnd, { passive: true });
}

// ===== DRAG AND DROP =====
function initDragAndDrop(container, type, getItemsFn) {
  let dragStartIndex = null;
  let dragItem = null;
  
  container.addEventListener('dragstart', function(e) {
    const item = e.target.closest('.list-item');
    if (!item) return;
    const itemsList = container.querySelectorAll('.list-item');
    dragStartIndex = Array.from(itemsList).indexOf(item);
    dragItem = item;
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragStartIndex);
  });
  
  container.addEventListener('dragend', function(e) {
    const item = e.target.closest('.list-item');
    if (item) item.classList.remove('dragging');
    container.querySelectorAll('.list-item.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragStartIndex = null;
    dragItem = null;
  });
  
  container.addEventListener('dragover', function(e) {
    e.preventDefault();
    const target = e.target.closest('.list-item');
    if (!target || target === dragItem) return;
    container.querySelectorAll('.list-item.drag-over').forEach(el => el.classList.remove('drag-over'));
    target.classList.add('drag-over');
  });
  
  container.addEventListener('drop', function(e) {
    e.preventDefault();
    const target = e.target.closest('.list-item');
    if (!target || dragStartIndex === null) return;
    container.querySelectorAll('.list-item.drag-over').forEach(el => el.classList.remove('drag-over'));
    
    const itemsList = container.querySelectorAll('.list-item');
    const dragEndIndex = Array.from(itemsList).indexOf(target);
    
    if (dragStartIndex !== dragEndIndex) {
      const itemsArray = getItemsFn();
      const [movedItem] = itemsArray.splice(dragStartIndex, 1);
      itemsArray.splice(dragEndIndex, 0, movedItem);
      
      if (type === 'task') {
        data.tasks = itemsArray;
      } else if (type === 'project') {
        data.projects = itemsArray;
      } else if (type === 'goal') {
        data.goals = itemsArray;
      }
      saveData();
      showToast('Порядок обновлён');
    }
  });
}

// ===== DELETE TASK BUTTON =====
function initDeleteButton() {
  content.addEventListener('click', function(e) {
    const btn = e.target.closest('.delete-btn');
    if (!btn) return;
    
    const item = btn.closest('.list-item');
    if (!item) return;
    
    const taskId = item.dataset.id;
    const task = data.tasks.find(t => t.id === taskId);
    
    if (task && task.completed) {
      if (confirm('Удалить задачу "' + task.text + '"?')) {
        data.tasks = data.tasks.filter(t => t.id !== taskId);
        saveData();
        showToast('Задача удалена');
        renderTasks();
      }
    }
  });
}

// ===== RENDER =====
function render() {
  if (currentTab === 'tasks') renderTasks();

  else if (currentTab === 'goals') renderGoals();
}

function renderTasks() {
  const active = data.tasks.filter(t => !t.completed);
  const completed = data.tasks.filter(t => t.completed);
  let html = `<div class="header"><h1>Задачи</h1><div class="header-date">${formatDate()}</div></div>
    <div class="input-area"><input type="text" class="input-field" id="task-input" placeholder="Новая задача..." maxlength="200"><button class="btn-add" id="add-task-btn">+</button></div>`;
  if (active.length === 0 && completed.length === 0) {
    html += `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Нет задач. Добавь первую!</p></div>`;
  } else {
    if (active.length > 0) {
      html += '<div class="section-title">Активные</div><div class="list task-list" data-type="tasks">';
      active.forEach(t => html += `<div class="list-item fade-in" draggable="true" data-id="${t.id}"><div class="checkbox" data-action="complete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="item-text">${escapeHtml(t.text)}</div></div>`);
      html += '</div>';
    }
    if (completed.length > 0) {
      html += '<div class="section-title">Выполненные</div><div class="list task-list" data-type="tasks">';
      completed.forEach(t => html += `<div class="list-item completed fade-in" draggable="true" data-id="${t.id}"><div class="checkbox" data-action="uncomplete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="item-text">${escapeHtml(t.text)}</div><button class="delete-btn" title="Удалить задачу"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button></div>`);
      html += '</div>';
    }
  }
  content.innerHTML = html;
  
  document.getElementById('add-task-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keypress', e => { if (e.key === 'Enter') addTask(); });
  
  content.querySelectorAll('.checkbox').forEach(cb => {
    cb.addEventListener('click', function(e) {
      e.stopPropagation();
      const item = this.closest('.list-item');
      if (!item) return;
      const id = item.dataset.id;
      const task = data.tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        saveData();
        renderTasks();
      }
    });
  });
  
  // Drag-and-drop для задач
  const taskLists = content.querySelectorAll('.task-list');
  taskLists.forEach(list => {
    initDragAndDrop(list, 'task', () => data.tasks);
  });
  
  // Свайп для удаления (только мобильные)
  initSwipeDelete();
  
  // Кнопка удаления для ПК
  initDeleteButton();
}

function addTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;
  data.tasks.unshift({ id: genId(), text, completed: false, createdAt: Date.now() });
  saveData(); input.value = ''; input.focus();
}

function renderProjects() {
  let html = `<div class="header"><h1>Проекты</h1><div class="header-date">${formatDate()}</div></div>
    <div class="input-area"><input type="text" class="input-field" id="project-input" placeholder="Новый проект..." maxlength="200"><button class="btn-add" id="add-project-btn">+</button></div>`;
  if (data.projects.length === 0) {
    html += `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><p>Нет проектов. Создай первый!</p></div>`;
  } else {
    html += '<div class="list project-list" data-type="projects">';
    data.projects.forEach(proj => {
      const subtasks = proj.subtasks || [];
      const completed = subtasks.filter(s => s.completed).length;
      html += `<div class="list-item fade-in" draggable="true" data-id="${proj.id}"><div class="item-text">${escapeHtml(proj.name)}</div><div class="item-meta">${completed}/${subtasks.length}</div><div class="item-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>`;
    });
    html += '</div>';
  }
  content.innerHTML = html;
  
  document.getElementById('add-project-btn').addEventListener('click', addProject);
  document.getElementById('project-input').addEventListener('keypress', e => { if (e.key === 'Enter') addProject(); });
  
  content.querySelectorAll('.list-item').forEach(item => {
    item.addEventListener('click', () => openProject(item.dataset.id));
  });
  
  const projectList = content.querySelector('.project-list');
  if (projectList) {
    initDragAndDrop(projectList, 'project', () => data.projects);
  }
}

function addProject() {
  const input = document.getElementById('project-input');
  const name = input.value.trim();
  if (!name) return;
  data.projects.unshift({ id: genId(), name, subtasks: [], createdAt: Date.now() });
  saveData(); input.value = ''; input.focus();
}

function renderGoals() {
  let html = `<div class="header"><h1>Цели</h1><div class="header-date">${formatDate()}</div></div>
    <div class="input-area"><input type="text" class="input-field" id="goal-input" placeholder="Новая цель..." maxlength="200"><button class="btn-add" id="add-goal-btn">+</button></div>`;
  if (data.goals.length === 0) {
    html += `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><p>Нет целей. Задай первую!</p></div>`;
  } else {
    html += '<div class="list goal-list" data-type="goals">';
    data.goals.forEach(g => html += `<div class="list-item fade-in" draggable="true" data-id="${g.id}"><div class="item-text">${escapeHtml(g.title)}</div><div class="item-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>`);
    html += '</div>';
  }
  content.innerHTML = html;
  
  document.getElementById('add-goal-btn').addEventListener('click', addGoal);
  document.getElementById('goal-input').addEventListener('keypress', e => { if (e.key === 'Enter') addGoal(); });
  
  content.querySelectorAll('.list-item').forEach(item => {
    item.addEventListener('click', () => openGoal(item.dataset.id));
  });
  
  const goalList = content.querySelector('.goal-list');
  if (goalList) {
    initDragAndDrop(goalList, 'goal', () => data.goals);
  }
}

function addGoal() {
  const input = document.getElementById('goal-input');
  const title = input.value.trim();
  if (!title) return;
  data.goals.unshift({ id: genId(), title, content: '', createdAt: Date.now() });
  saveData(); input.value = ''; input.focus();
}

function openProject(projectId) {
  const project = data.projects.find(p => p.id === projectId);
  if (!project) return;
  currentProject = project;
  const html = buildProjectDetail(project);
  if (isDesktopView()) {
    detailTitle.textContent = escapeHtml(project.name);
    detailContent.innerHTML = html;
    attachProjectListeners(projectId);
  } else {
    modalTitle.textContent = escapeHtml(project.name);
    modalContent.innerHTML = html;
    modal.classList.add('active');
    attachProjectListeners(projectId);
  }
}

function buildProjectDetail(project) {
  let html = `<div class="input-area" style="margin-bottom: 16px;"><input type="text" class="input-field" id="subtask-input" placeholder="Новая подзадача..." maxlength="200"><button class="btn-add" id="add-subtask-btn">+</button></div><div class="list" style="border-radius: 12px; overflow: hidden;">`;
  const subtasks = project.subtasks || [];
  if (subtasks.length === 0) {
    html += `<div class="empty-state" style="padding: 40px 20px;"><p>Нет подзадач. Добавь первую!</p></div>`;
  } else {
    subtasks.forEach((sub, idx) => {
      html += `<div class="subtask-item ${sub.completed ? 'completed' : ''}" data-idx="${idx}"><div class="subtask-checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="subtask-text">${escapeHtml(sub.text)}</div></div>`;
    });
  }
  html += '</div>';
  html += `<div class="project-delete-container"><button class="btn-delete" id="delete-project-btn">Удалить проект</button></div>`;
  return html;
}

function attachProjectListeners(projectId) {
  const btn = document.getElementById('add-subtask-btn');
  if (btn) btn.addEventListener('click', () => addSubtask(projectId));
  const input = document.getElementById('subtask-input');
  if (input) input.addEventListener('keypress', e => { if (e.key === 'Enter') addSubtask(projectId); });

  const container = isDesktopView() ? detailContent : modalContent;
  container.querySelectorAll('.subtask-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx);
      const proj = data.projects.find(p => p.id === projectId);
      if (proj && proj.subtasks && proj.subtasks[idx]) {
        proj.subtasks[idx].completed = !proj.subtasks[idx].completed;
        saveData();
        openProject(projectId);
      }
    });
  });

  const delBtn = document.getElementById('delete-project-btn');
  if (delBtn) {
    delBtn.addEventListener('click', () => {
      const proj = data.projects.find(p => p.id === projectId);
      const projName = proj ? proj.name : 'этот проект';
      if (confirm('Удалить проект "' + projName + '"?')) {
        data.projects = data.projects.filter(p => p.id !== projectId);
        saveData();
        showToast('Проект удалён');
        if (isDesktopView()) {
          resetDetailPanel();
        } else {
          closeModal();
        }
      }
    });
  }
}

function addSubtask(projectId) {
  const input = document.getElementById('subtask-input');
  const text = input.value.trim();
  if (!text) return;
  const proj = data.projects.find(p => p.id === projectId);
  if (proj) {
    if (!proj.subtasks) proj.subtasks = [];
    proj.subtasks.push({ text, completed: false, createdAt: Date.now() });
    saveData();
    openProject(projectId);
  }
}

function openGoal(goalId) {
  const goal = data.goals.find(g => g.id === goalId);
  if (!goal) return;
  currentGoal = goal;
  const html = `<textarea class="goal-textarea" id="goal-textarea" placeholder="Опиши свою цель, мысли, идеи...">${escapeHtml(goal.content || '')}</textarea>
    <div style="margin-top: 16px; display: flex; align-items: center; gap: 10px;">
      <button class="btn-add" id="save-goal-btn" style="width: auto; height: 44px; padding: 0 24px; font-size: 15px; border-radius: 10px;">Сохранить</button>
      <button class="btn-delete" id="delete-goal-btn" style="width: auto; height: 44px; padding: 0 24px; margin-top: 0;">Удалить цель</button>
    </div>`;
  if (isDesktopView()) {
    detailTitle.textContent = escapeHtml(goal.title);
    detailContent.innerHTML = html;
    attachGoalListeners(goalId);
  } else {
    modalTitle.textContent = escapeHtml(goal.title);
    modalContent.innerHTML = html;
    modal.classList.add('active');
    attachGoalListeners(goalId);
  }
}

function attachGoalListeners(goalId) {
  const textarea = document.getElementById('goal-textarea');
  if (textarea) textarea.focus();
  const saveBtn = document.getElementById('save-goal-btn');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    const goal = data.goals.find(g => g.id === goalId);
    if (goal) { goal.content = textarea.value; saveData(); showToast('Сохранено'); }
    if (!isDesktopView()) closeModal();
  });
  const delBtn = document.getElementById('delete-goal-btn');
  if (delBtn) delBtn.addEventListener('click', () => {
    if (confirm('Удалить цель?')) {
      data.goals = data.goals.filter(g => g.id !== goalId);
      saveData(); showToast('Цель удалена');
      if (isDesktopView()) {
        resetDetailPanel();
      } else {
        closeModal();
      }
    }
  });
}

function resetDetailPanel() {
  detailTitle.textContent = 'Выберите элемент';
  detailContent.innerHTML = `<div class="detail-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><p>Выберите проект или цель<br>чтобы увидеть детали</p></div>`;
}

// ===== NAVIGATION =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item, .sidebar-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll(`[data-tab="${tab}"]`).forEach(i => i.classList.add('active'));
  if (isDesktopView()) {
    resetDetailPanel();
  }
  render();
}

document.querySelectorAll('.nav-item, .sidebar-item').forEach(item => {
  item.addEventListener('click', () => switchTab(item.dataset.tab));
});

// ===== MODAL / DETAIL CLOSE =====
document.getElementById('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.getElementById('detail-close').addEventListener('click', resetDetailPanel);

function closeModal() {
  modal.classList.remove('active');
  currentProject = null; currentGoal = null;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ===== RESIZE HANDLER =====
window.addEventListener('resize', () => {
  const wasDesktop = isDesktop;
  isDesktop = window.innerWidth >= 769;
  if (wasDesktop !== isDesktop) {
    if (isDesktop) {
      desktopDetail.style.display = 'flex';
      document.getElementById('desktop-sidebar').style.display = 'flex';
      resetDetailPanel();
    } else {
      desktopDetail.style.display = 'none';
      closeModal();
    }
    render();
  }
});

// ===== PWA =====
window.addEventListener('beforeinstallprompt', e => { console.log('PWA install available'); });

console.log('Planner initialized with desktop delete button');
</script>
