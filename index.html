<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Planner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a;
    --bg-secondary: #141414;
    --bg-tertiary: #1c1c1e;
    --bg-card: #1c1c1e;
    --bg-input: #2c2c2e;
    --text-primary: #ffffff;
    --text-secondary: #8e8e93;
    --text-tertiary: #636366;
    --accent: #0a84ff;
    --accent-light: #64d2ff;
    --success: #30d158;
    --danger: #ff453a;
    --warning: #ff9f0a;
    --separator: #38383a;
    --separator-light: #2c2c2e;
    --overlay: rgba(0,0,0,0.7);
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #app { height: 100%; display: flex; flex-direction: column; }

  /* Auth Screen */
  #auth-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #auth-screen.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }
  .auth-icon {
    width: 80px; height: 80px; border-radius: 20px;
    background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .auth-icon svg { width: 40px; height: 40px; color: var(--accent); }
  .auth-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
  .auth-subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; text-align: center; }
  .quote-box {
    background: var(--bg-card); border-radius: 16px; padding: 20px;
    margin-bottom: 32px; max-width: 320px; text-align: center;
    border: 1px solid var(--separator-light);
  }
  .quote-text { font-size: 14px; color: var(--text-primary); line-height: 1.5; font-style: italic; }
  .quote-author { font-size: 12px; color: var(--text-tertiary); margin-top: 8px; }
  .pin-display {
    display: flex; gap: 16px; margin-bottom: 32px;
  }
  .pin-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--bg-input); border: 2px solid var(--separator);
    transition: all 0.2s ease;
  }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: var(--danger); border-color: var(--danger); animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .numpad {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    max-width: 280px;
  }
  .numpad-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--bg-tertiary); border: none;
    color: var(--text-primary); font-size: 24px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s ease;
    -webkit-touch-callout: none; user-select: none;
  }
  .numpad-btn:active { background: var(--separator); transform: scale(0.92); }
  .numpad-btn.delete { background: transparent; color: var(--text-secondary); font-size: 18px; }

  /* Main Content */
  .content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px 16px 100px; -webkit-overflow-scrolling: touch;
  }
  .content::-webkit-scrollbar { display: none; }

  /* Header */
  .header {
    padding: 16px 16px 8px; position: sticky; top: 0;
    background: var(--bg); z-index: 10;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
  .header-date { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  /* Input Area */
  .input-area {
    display: flex; gap: 8px; padding: 12px 0; margin-bottom: 8px;
  }
  .input-field {
    flex: 1; background: var(--bg-input); border: none; border-radius: 12px;
    padding: 12px 16px; color: var(--text-primary); font-size: 16px;
    outline: none; font-family: inherit;
  }
  .input-field::placeholder { color: var(--text-tertiary); }
  .btn-add {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--accent); border: none; color: white;
    font-size: 24px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s ease; flex-shrink: 0;
  }
  .btn-add:active { transform: scale(0.92); opacity: 0.8; }

  /* Lists */
  .list { display: flex; flex-direction: column; gap: 1px; }
  .list-item {
    background: var(--bg-card); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all 0.2s ease;
    position: relative; overflow: hidden;
  }
  .list-item:first-child { border-radius: 12px 12px 0 0; }
  .list-item:last-child { border-radius: 0 0 12px 12px; }
  .list-item:only-child { border-radius: 12px; }
  .list-item:active { background: var(--bg-tertiary); }
  .list-item.completed .item-text { text-decoration: line-through; color: var(--text-tertiary); }
  .list-item.completed .checkbox { background: var(--success); border-color: var(--success); }
  .list-item.swiping { transform: translateX(-80px); }
  .checkbox {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--separator); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
  }
  .checkbox svg { width: 12px; height: 12px; color: white; opacity: 0; transition: opacity 0.2s; }
  .list-item.completed .checkbox svg { opacity: 1; }
  .item-text { flex: 1; font-size: 16px; line-height: 1.4; word-break: break-word; }
  .item-arrow { color: var(--text-tertiary); font-size: 14px; }
  .item-meta { font-size: 12px; color: var(--text-tertiary); }
  .delete-swipe {
    position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
    background: var(--danger); display: flex; align-items: center; justify-content: center;
    color: white; font-size: 13px; font-weight: 600;
  }
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-tertiary);
  }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 15px; }

  /* Sections */
  .section-title {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 20px 4px 8px;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    border-top: 1px solid var(--separator-light);
    display: flex; justify-content: space-around; align-items: center;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 6px 0; cursor: pointer; transition: all 0.2s;
    color: var(--text-tertiary); text-decoration: none; border: none; background: none;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 24px; height: 24px; }
  .nav-item span { font-size: 10px; font-weight: 500; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: var(--overlay);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal-sheet {
    background: var(--bg-secondary); width: 100%; max-width: 500px;
    border-radius: 24px 24px 0 0; padding: 20px 0 30px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh; display: flex; flex-direction: column;
  }
  .modal-overlay.active .modal-sheet { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 5px; border-radius: 3px;
    background: var(--separator); margin: 0 auto 16px;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px 16px;
  }
  .modal-title { font-size: 20px; font-weight: 700; }
  .modal-close {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-tertiary); border: none; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .modal-content { flex: 1; overflow-y: auto; padding: 0 20px; }
  .modal-content::-webkit-scrollbar { display: none; }

  /* Textarea for goals */
  .goal-textarea {
    width: 100%; min-height: 200px; background: var(--bg-input); border: none;
    border-radius: 12px; padding: 16px; color: var(--text-primary); font-size: 16px;
    font-family: inherit; resize: vertical; outline: none; line-height: 1.6;
  }
  .goal-textarea::placeholder { color: var(--text-tertiary); }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
    background: var(--bg-tertiary); color: var(--text-primary); padding: 12px 20px;
    border-radius: 12px; font-size: 14px; z-index: 300; opacity: 0;
    transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border: 1px solid var(--separator);
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Loading */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--separator);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-secondary); }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  /* Project subtasks */
  .subtask-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    background: var(--bg-card); border-bottom: 1px solid var(--separator-light);
  }
  .subtask-item:last-child { border-bottom: none; }
  .subtask-item.completed .subtask-text { text-decoration: line-through; color: var(--text-tertiary); }
  .subtask-checkbox {
    width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid var(--separator); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
  }
  .subtask-item.completed .subtask-checkbox { background: var(--success); border-color: var(--success); }
  .subtask-checkbox svg { width: 12px; height: 12px; color: white; opacity: 0; }
  .subtask-item.completed .subtask-checkbox svg { opacity: 1; }
  .subtask-text { flex: 1; font-size: 15px; }

  /* Responsive */
  @media (min-width: 768px) {
    #app { max-width: 430px; margin: 0 auto; border-left: 1px solid var(--separator); border-right: 1px solid var(--separator); }
    .bottom-nav { max-width: 430px; left: 50%; transform: translateX(-50%); }
  }
</style>
</head>
<body>
<div id="app">
  <!-- Loading -->
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Загрузка...</div>
  </div>

  <!-- Auth -->
  <div id="auth-screen">
    <div class="auth-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </div>
    <div class="auth-title">Planner</div>
    <div class="auth-subtitle">Введите код доступа</div>
    <div class="quote-box">
      <div class="quote-text" id="quote-text"></div>
      <div class="quote-author" id="quote-author"></div>
    </div>
    <div class="pin-display" id="pin-display">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="numpad" id="numpad">
      <button class="numpad-btn" data-num="1">1</button>
      <button class="numpad-btn" data-num="2">2</button>
      <button class="numpad-btn" data-num="3">3</button>
      <button class="numpad-btn" data-num="4">4</button>
      <button class="numpad-btn" data-num="5">5</button>
      <button class="numpad-btn" data-num="6">6</button>
      <button class="numpad-btn" data-num="7">7</button>
      <button class="numpad-btn" data-num="8">8</button>
      <button class="numpad-btn" data-num="9">9</button>
      <div></div>
      <button class="numpad-btn" data-num="0">0</button>
      <button class="numpad-btn delete" data-action="delete">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
      </button>
    </div>
  </div>

  <!-- Main -->
  <div id="main-screen" style="display:none; flex-direction:column; height:100%;">
    <div class="content" id="content"></div>
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="tasks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Задачи</span>
      </button>
      <button class="nav-item" data-tab="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>Проекты</span>
      </button>
      <button class="nav-item" data-tab="goals">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <span>Цели</span>
      </button>
    </nav>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Заголовок</div>
        <button class="modal-close" id="modal-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove, update, push, child } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYjECT3r5FtaGCBTYkMAcx9uBJf6sGpOA",
  authDomain: "planner-807fb.firebaseapp.com",
  databaseURL: "https://planner-807fb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "planner-807fb",
  storageBucket: "planner-807fb.firebasestorage.app",
  messagingSenderId: "3741010447",
  appId: "1:3741010447:web:90734f4ea6d74b4e57f17a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db);

// Quotes
const quotes = [
  { text: "Планирование — это bringing the future into the present so that you can do something about it now.", author: "Alan Lakein" },
  { text: "Цель без плана — это просто желание.", author: "Antoine de Saint-Exupéry" },
  { text: "Тот, кто не планирует, планирует провал.", author: "Benjamin Franklin" },
  { text: "Время — это то, во что мы одеты, как в одежду, и оно никогда не подходит.", author: "Дейл Карнеги" },
  { text: "Планируй свою работу и работай по плану.", author: "Brian Tracy" },
  { text: "Маленькие шаги каждый день ведут к большим результатам.", author: "" },
  { text: "Дисциплина — это мост между целями и достижениями.", author: "Jim Rohn" },
  { text: "Лучшее время посадить дерево было 20 лет назад. Следующее лучшее время — сейчас.", author: "Китайская пословица" },
  { text: "Организованность — это не навык, а выбор.", author: "" },
  { text: "Ты не можешь управлять временем, но можешь управлять собой.", author: "Peter Drucker" },
  { text: "Каждая завершённая задача — это кирпичик в фундаменте твоего успеха.", author: "" },
  { text: "Порядок в делах рождает порядок в мыслях.", author: "" }
];

// State
let currentTab = 'tasks';
let currentProject = null;
let currentGoal = null;
let pin = '';
let data = { tasks: [], projects: [], goals: [] };
let userId = null;

// DOM
const authScreen = document.getElementById('auth-screen');
const mainScreen = document.getElementById('main-screen');
const content = document.getElementById('content');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const modalContent = document.getElementById('modal-content');
const toastEl = document.getElementById('toast');
const loadingEl = document.getElementById('loading');
const pinDisplay = document.getElementById('pin-display');

// Generate user ID
function getUserId() {
  let id = localStorage.getItem('planner_user_id');
  if (!id) {
    id = 'user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('planner_user_id', id);
  }
  return id;
}

userId = getUserId();

// Show random quote
function showQuote() {
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('quote-text').textContent = '"' + q.text + '"';
  document.getElementById('quote-author').textContent = q.author ? '— ' + q.author : '';
}
showQuote();

// PIN
function updatePinDisplay() {
  const dots = pinDisplay.querySelectorAll('.pin-dot');
  dots.forEach((d, i) => d.classList.toggle('filled', i < pin.length));
}

function onPinError() {
  const dots = pinDisplay.querySelectorAll('.pin-dot');
  dots.forEach(d => d.classList.add('error'));
  setTimeout(() => dots.forEach(d => d.classList.remove('error')), 400);
  pin = '';
  updatePinDisplay();
}

function checkPin() {
  if (pin === '7350') {
    authScreen.classList.add('hidden');
    setTimeout(() => {
      authScreen.style.display = 'none';
      mainScreen.style.display = 'flex';
      loadData();
    }, 500);
  } else {
    onPinError();
    showToast('Неверный код');
  }
}

document.getElementById('numpad').addEventListener('click', e => {
  const btn = e.target.closest('.numpad-btn');
  if (!btn) return;
  const action = btn.dataset.action;
  const num = btn.dataset.num;
  if (action === 'delete') {
    pin = pin.slice(0, -1);
  } else if (num && pin.length < 4) {
    pin += num;
    if (pin.length === 4) {
      setTimeout(checkPin, 150);
    }
  }
  updatePinDisplay();
});

// Toast
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// Firebase helpers
function getUserRef() {
  return ref(db, 'users/' + userId);
}

async function saveData() {
  try {
    await set(getUserRef(), data);
  } catch (e) {
    console.error('Save error:', e);
    showToast('Ошибка сохранения');
  }
}

function loadData() {
  loadingEl.style.display = 'flex';
  onValue(getUserRef(), snapshot => {
    const val = snapshot.val();
    if (val) {
      data = val;
    } else {
      data = { tasks: [], projects: [], goals: [] };
    }
    // Ensure arrays
    if (!Array.isArray(data.tasks)) data.tasks = [];
    if (!Array.isArray(data.projects)) data.projects = [];
    if (!Array.isArray(data.goals)) data.goals = [];
    loadingEl.style.display = 'none';
    render();
  }, err => {
    console.error('Load error:', err);
    loadingEl.style.display = 'none';
    showToast('Ошибка загрузки данных');
    render();
  });
}

// Generate ID
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

// Date
function formatDate() {
  const d = new Date();
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  return days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()];
}

// Render
function render() {
  if (currentTab === 'tasks') renderTasks();
  else if (currentTab === 'projects') renderProjects();
  else if (currentTab === 'goals') renderGoals();
}

function renderTasks() {
  const active = data.tasks.filter(t => !t.completed);
  const completed = data.tasks.filter(t => t.completed);

  let html = `
    <div class="header">
      <h1>Задачи</h1>
      <div class="header-date">${formatDate()}</div>
    </div>
    <div class="input-area">
      <input type="text" class="input-field" id="task-input" placeholder="Новая задача..." maxlength="200">
      <button class="btn-add" id="add-task-btn">+</button>
    </div>
  `;

  if (active.length === 0 && completed.length === 0) {
    html += `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <p>Нет задач. Добавь первую!</p>
      </div>
    `;
  } else {
    if (active.length > 0) {
      html += '<div class="section-title">Активные</div><div class="list">';
      active.forEach(task => {
        html += `
          <div class="list-item fade-in" data-id="${task.id}">
            <div class="checkbox" data-action="complete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div class="item-text">${escapeHtml(task.text)}</div>
          </div>
        `;
      });
      html += '</div>';
    }
    if (completed.length > 0) {
      html += '<div class="section-title">Выполненные</div><div class="list">';
      completed.forEach(task => {
        html += `
          <div class="list-item completed fade-in" data-id="${task.id}">
            <div class="checkbox" data-action="uncomplete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div class="item-text">${escapeHtml(task.text)}</div>
          </div>
        `;
      });
      html += '</div>';
    }
  }

  content.innerHTML = html;

  document.getElementById('add-task-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') addTask();
  });

  content.querySelectorAll('.list-item').forEach(item => {
    item.addEventListener('click', e => {
      const action = e.target.closest('[data-action]')?.dataset.action;
      const id = item.dataset.id;
      if (action === 'complete') {
        const task = data.tasks.find(t => t.id === id);
        if (task) {
          // Delete immediately on complete
          data.tasks = data.tasks.filter(t => t.id !== id);
          saveData();
          showToast('Задача выполнена');
        }
      }
    });
  });
}

function addTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;
  data.tasks.unshift({ id: genId(), text, completed: false, createdAt: Date.now() });
  saveData();
  input.value = '';
  input.focus();
}

function renderProjects() {
  let html = `
    <div class="header">
      <h1>Проекты</h1>
      <div class="header-date">${formatDate()}</div>
    </div>
    <div class="input-area">
      <input type="text" class="input-field" id="project-input" placeholder="Новый проект..." maxlength="200">
      <button class="btn-add" id="add-project-btn">+</button>
    </div>
  `;

  if (data.projects.length === 0) {
    html += `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <p>Нет проектов. Создай первый!</p>
      </div>
    `;
  } else {
    html += '<div class="list">';
    data.projects.forEach(proj => {
      const subtasks = proj.subtasks || [];
      const completed = subtasks.filter(s => s.completed).length;
      const total = subtasks.length;
      const progress = total > 0 ? Math.round((completed / total) * 100) : 0;
      html += `
        <div class="list-item fade-in" data-id="${proj.id}">
          <div class="item-text">${escapeHtml(proj.name)}</div>
          <div class="item-meta">${completed}/${total}</div>
          <div class="item-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
      `;
    });
    html += '</div>';
  }

  content.innerHTML = html;

  document.getElementById('add-project-btn').addEventListener('click', addProject);
  document.getElementById('project-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') addProject();
  });

  content.querySelectorAll('.list-item').forEach(item => {
    item.addEventListener('click', () => {
      const id = item.dataset.id;
      openProject(id);
    });
  });
}

function addProject() {
  const input = document.getElementById('project-input');
  const name = input.value.trim();
  if (!name) return;
  data.projects.unshift({ id: genId(), name, subtasks: [], createdAt: Date.now() });
  saveData();
  input.value = '';
  input.focus();
}

function openProject(projectId) {
  const project = data.projects.find(p => p.id === projectId);
  if (!project) return;
  currentProject = project;

  modalTitle.textContent = escapeHtml(project.name);

  let html = `
    <div class="input-area" style="margin-bottom: 16px;">
      <input type="text" class="input-field" id="subtask-input" placeholder="Новая подзадача..." maxlength="200">
      <button class="btn-add" id="add-subtask-btn">+</button>
    </div>
    <div class="list" style="border-radius: 12px; overflow: hidden;">
  `;

  const subtasks = project.subtasks || [];
  if (subtasks.length === 0) {
    html += `
      <div class="empty-state" style="padding: 40px 20px;">
        <p>Нет подзадач. Добавь первую!</p>
      </div>
    `;
  } else {
    subtasks.forEach((sub, idx) => {
      html += `
        <div class="subtask-item ${sub.completed ? 'completed' : ''}" data-idx="${idx}">
          <div class="subtask-checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="subtask-text">${escapeHtml(sub.text)}</div>
        </div>
      `;
    });
  }
  html += '</div>';

  modalContent.innerHTML = html;
  modal.classList.add('active');

  document.getElementById('add-subtask-btn').addEventListener('click', () => addSubtask(projectId));
  document.getElementById('subtask-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') addSubtask(projectId);
  });

  modalContent.querySelectorAll('.subtask-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx);
      const proj = data.projects.find(p => p.id === projectId);
      if (proj && proj.subtasks[idx]) {
        proj.subtasks[idx].completed = !proj.subtasks[idx].completed;
        saveData();
        openProject(projectId); // re-render
      }
    });
  });
}

function addSubtask(projectId) {
  const input = document.getElementById('subtask-input');
  const text = input.value.trim();
  if (!text) return;
  const proj = data.projects.find(p => p.id === projectId);
  if (proj) {
    if (!proj.subtasks) proj.subtasks = [];
    proj.subtasks.push({ text, completed: false, createdAt: Date.now() });
    saveData();
    openProject(projectId);
  }
}

function renderGoals() {
  let html = `
    <div class="header">
      <h1>Цели</h1>
      <div class="header-date">${formatDate()}</div>
    </div>
    <div class="input-area">
      <input type="text" class="input-field" id="goal-input" placeholder="Новая цель..." maxlength="200">
      <button class="btn-add" id="add-goal-btn">+</button>
    </div>
  `;

  if (data.goals.length === 0) {
    html += `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <p>Нет целей. Задай первую!</p>
      </div>
    `;
  } else {
    html += '<div class="list">';
    data.goals.forEach(goal => {
      html += `
        <div class="list-item fade-in" data-id="${goal.id}">
          <div class="item-text">${escapeHtml(goal.title)}</div>
          <div class="item-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
      `;
    });
    html += '</div>';
  }

  content.innerHTML = html;

  document.getElementById('add-goal-btn').addEventListener('click', addGoal);
  document.getElementById('goal-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') addGoal();
  });

  content.querySelectorAll('.list-item').forEach(item => {
    item.addEventListener('click', () => {
      const id = item.dataset.id;
      openGoal(id);
    });
  });
}

function addGoal() {
  const input = document.getElementById('goal-input');
  const title = input.value.trim();
  if (!title) return;
  data.goals.unshift({ id: genId(), title, content: '', createdAt: Date.now() });
  saveData();
  input.value = '';
  input.focus();
}

function openGoal(goalId) {
  const goal = data.goals.find(g => g.id === goalId);
  if (!goal) return;
  currentGoal = goal;

  modalTitle.textContent = escapeHtml(goal.title);

  modalContent.innerHTML = `
    <textarea class="goal-textarea" id="goal-textarea" placeholder="Опиши свою цель, мысли, идеи...">${escapeHtml(goal.content || '')}</textarea>
    <div style="margin-top: 12px; display: flex; gap: 8px;">
      <button class="btn-add" id="save-goal-btn" style="width: auto; padding: 0 20px; font-size: 15px; border-radius: 10px;">Сохранить</button>
      <button class="btn-add" id="delete-goal-btn" style="width: auto; padding: 0 20px; font-size: 15px; border-radius: 10px; background: var(--danger);">Удалить</button>
    </div>
  `;
  modal.classList.add('active');

  const textarea = document.getElementById('goal-textarea');
  textarea.focus();

  document.getElementById('save-goal-btn').addEventListener('click', () => {
    goal.content = textarea.value;
    saveData();
    showToast('Сохранено');
    closeModal();
  });

  document.getElementById('delete-goal-btn').addEventListener('click', () => {
    if (confirm('Удалить цель?')) {
      data.goals = data.goals.filter(g => g.id !== goalId);
      saveData();
      showToast('Цель удалена');
      closeModal();
    }
  });
}

// Modal close
document.getElementById('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', e => {
  if (e.target === modal) closeModal();
});

function closeModal() {
  modal.classList.remove('active');
  currentProject = null;
  currentGoal = null;
}

// Tab switching
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    currentTab = item.dataset.tab;
    render();
  });
});

// Escape HTML
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Swipe to delete on tasks
let touchStartX = 0;
let touchCurrentX = 0;
let swipingItem = null;

content.addEventListener('touchstart', e => {
  const item = e.target.closest('.list-item');
  if (!item || currentTab !== 'tasks') return;
  touchStartX = e.touches[0].clientX;
  swipingItem = item;
}, { passive: true });

content.addEventListener('touchmove', e => {
  if (!swipingItem) return;
  touchCurrentX = e.touches[0].clientX;
  const diff = touchStartX - touchCurrentX;
  if (diff > 0 && diff < 100) {
    swipingItem.style.transform = `translateX(-${diff}px)`;
  }
}, { passive: true });

content.addEventListener('touchend', e => {
  if (!swipingItem) return;
  const diff = touchStartX - touchCurrentX;
  if (diff > 60) {
    const id = swipingItem.dataset.id;
    const task = data.tasks.find(t => t.id === id);
    if (task && !task.completed) {
      if (confirm('Удалить задачу?')) {
        data.tasks = data.tasks.filter(t => t.id !== id);
        saveData();
        showToast('Задача удалена');
      }
    }
  }
  swipingItem.style.transform = '';
  swipingItem = null;
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Init
console.log('Planner initialized. User:', userId);
</script>
